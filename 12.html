<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Avaliação Teológica AVANCE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #004e89; --secondary: #800000; --gold: #c5a059; }
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        #timer { font-size: 1.5rem; font-weight: bold; color: #800000; text-align: center; padding: 15px; border: 2px solid #800000; margin-bottom: 20px; }
        .questao { margin-bottom: 20px; padding: 15px; border-left: 5px solid #004e89; background: #fff; }
        #btn-finalizar { background: #800000; color: white; padding: 15px; width: 100%; border: none; cursor: pointer; }
        #btn-pdf { background: #004e89; color: white; padding: 15px; width: 100%; border: none; cursor: pointer; display: none; }
        
        /* Certificado escondido fora da tela */
        #certificado-wrapper { position: absolute; left: -9999px; top: 0; }
        #certificado-area { width: 850px; height: 600px; padding: 40px; background: white; border: 20px solid #004e89; }
    </style>
</head>
<body>

<div class="container" id="conteudo-principal">
    <div id="timer">TEMPO RESTANTE: 30:00</div>
    
    <input type="text" id="aluno-nome" placeholder="Nome Completo" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="text" id="aluno-cpf" placeholder="CPF" style="width:100%; padding:10px; margin-bottom:20px;">

    <form id="quiz-form">
        <div class="questao" data-resp="B"><p>1. (Bibliologia) Qual termo define que a Bíblia é a autoridade final?</p><label><input type="radio" name="q1" value="A"> Inerrância</label><label><input type="radio" name="q1" value="B"> Sola Scriptura</label></div>
        <div class="questao" data-resp="A"><p>2. (Cristologia) A união hipostática defende:</p><label><input type="radio" name="q2" value="A"> 100% Homem e 100% Deus.</label><label><input type="radio" name="q2" value="B"> Apenas Deus.</label></div>
        <div class="questao" data-resp="C"><p>3. (Hermenêutica) O que busca a Exegese?</p><label><input type="radio" name="q3" value="A"> Opinião pessoal.</label><label><input type="radio" name="q3" value="C"> Sentido original.</label></div>
        <button type="button" id="btn-finalizar" onclick="corrigir()">FINALIZAR AVALIAÇÃO</button>
        <button type="button" id="btn-pdf" onclick="gerarPDF()">BAIXAR CERTIFICADO (PDF)</button>
    </form>
</div>

<div id="certificado-wrapper">
    <div id="certificado-area">
        <h1 style="color:#800000;">CERTIFICADO</h1>
        <p>Aluno: <span id="cert-nome"></span></p>
        <p>Data: 13/06/2026</p>
    </div>
</div>

<script>
    // Cronômetro isolado
    let segundos = 1800;
    const timerElement = document.getElementById('timer');
    
    const interval = setInterval(() => {
        segundos--;
        let m = Math.floor(segundos / 60);
        let s = segundos % 60;
        timerElement.innerText = `TEMPO RESTANTE: ${m}:${s < 10 ? '0'+s : s}`;
        
        if (segundos <= 0) {
            clearInterval(interval);
            alert("Tempo esgotado!");
        }
    }, 1000);

    function corrigir() {
        const nome = document.getElementById('aluno-nome').value;
        if(!nome) return alert("Digite o nome");
        
        document.getElementById('cert-nome').innerText = nome;
        document.getElementById('btn-finalizar').style.display = 'none';
        document.getElementById('btn-pdf').style.display = 'block';
    }

    function gerarPDF() {
        // Gera o PDF sem tocar no cronômetro
        const element = document.getElementById('certificado-area');
        html2pdf().set({
            filename: 'Certificado.pdf',
            jsPDF: { unit: 'px', format: [850, 600], orientation: 'landscape' }
        }).from(element).save();
    }
</script>
</body>
</html>
