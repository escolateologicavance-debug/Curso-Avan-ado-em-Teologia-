<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; }
        .questao { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; }
        #timer { font-weight: bold; color: red; font-size: 1.2rem; margin-bottom: 10px; }
        #certificado-area { display: none; width: 800px; padding: 40px; background: white; border: 10px solid #004e89; }
        .btn { width: 100%; padding: 15px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="quiz-container" class="container">
    <div id="timer">Tempo: 30:00</div>
    <input type="text" id="nome" placeholder="Nome" class="btn">
    <input type="text" id="cpf" placeholder="CPF" class="btn">
    
    <div class="questao" data-resp="B">
        <p>1. (Bibliologia) Qual termo define que a Bíblia é a autoridade final?</p>
        <label><input type="radio" name="q1" value="A"> Inerrância</label><br>
        <label><input type="radio" name="q1" value="B"> Sola Scriptura</label>
    </div>

    <button class="btn" onclick="corrigir()">FINALIZAR</button>
    <button id="btn-pdf" class="btn" style="display:none; background: green; color: white;" onclick="gerarPDF()">BAIXAR CERTIFICADO</button>
</div>

<div id="certificado-area">
    <h1>CERTIFICADO</h1>
    <p>Aluno: <span id="c-nome"></span></p>
    <p>Data: <span id="c-data"></span></p>
</div>

<script>
    // Cronômetro simples
    let segs = 1800;
    const timerDiv = document.getElementById('timer');
    const interval = setInterval(() => {
        segs--;
        let m = Math.floor(segs/60);
        let s = segs % 60;
        timerDiv.innerText = `Tempo: ${m}:${s < 10 ? '0'+s : s}`;
        if(segs <= 0) clearInterval(interval);
    }, 1000);

    function corrigir() {
        const nome = document.getElementById('nome').value;
        if(!nome) { alert("Nome obrigatório"); return; }
        
        // Simula acertos
        alert("Aprovado!");
        document.getElementById('btn-pdf').style.display = 'block';
        document.getElementById('c-nome').innerText = nome;
        document.getElementById('c-data').innerText = new Date().toLocaleDateString();
    }

    function gerarPDF() {
        const element = document.getElementById('certificado-area');
        const quiz = document.getElementById('quiz-container');
        
        quiz.style.display = 'none';
        element.style.display = 'block';
        
        html2pdf().from(element).set({
            margin: 0,
            filename: 'Certificado.pdf',
            jsPDF: { unit: 'px', format: [850, 650], orientation: 'landscape' }
        }).save().then(() => {
            element.style.display = 'none';
            quiz.style.display = 'block';
        });
    }
</script>
</body>
</html>
