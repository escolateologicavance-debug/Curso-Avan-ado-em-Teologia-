<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avance - Faculdade Teológica</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00a8e8">
    <link rel="apple-touch-icon" href="logo-192.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo-arte {
            width: 100%;
            max-width: 250px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.9);
        }

        input:focus {
            border-color: #00a8e8;
            box-shadow: 0 0 8px rgba(0, 168, 232, 0.2);
        }

        .btn-entrar {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #00a8e8, #0077b6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-entrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 119, 182, 0.3);
        }

        .btn-entrar:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="logo.png" alt="Logo Avance" class="logo-arte">

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="usuario" placeholder="Usuário" required>
            </div>
            <div class="input-group">
                <input type="password" id="senha" placeholder="Senha" required>
            </div>
            <button type="submit" class="btn-entrar">ACESSAR</button>
        </form>
    </div>

    <script>
        // Lógica de Login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const senhaSecreta = "avancadomt";
            const senhaDigitada = document.getElementById('senha').value;

            if (senhaDigitada === senhaSecreta) {
                window.location.href = "1.html";
            } else {
                alert("Senha incorreta!");
            }
        });

        // Registro do Service Worker (SW)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrado!', reg))
                    .catch(err => console.log('Erro no SW', err));
            });
        }
    </script>
</body>
</html>
